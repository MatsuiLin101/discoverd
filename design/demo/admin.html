<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo 後台 · 找到了旅遊</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    body { background: #fffcfd; color: #374151; }
    .ql-container { min-height: 200px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; }
    .ql-toolbar.ql-snow { border-radius: 8px 8px 0 0; border-color: #e5e7eb; }
    .ql-container.ql-snow { border-radius: 0 0 8px 8px; border-color: #e5e7eb; }
    .preview-item { position: relative; }
    .preview-item .remove-btn {
      position: absolute; top: -6px; right: -6px;
      background: #ef4444; color: white; border: none; border-radius: 50%;
      width: 20px; height: 20px; font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav style="background:#D12351" class="text-white px-6 py-4 flex items-center justify-between shadow-md sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-white bg-opacity-20 rounded-lg flex items-center justify-center font-bold text-sm">D</div>
    <span class="font-medium tracking-wide">Demo 後台 · 找到了旅遊</span>
  </div>
  <a href="showcase.html" class="text-sm bg-white bg-opacity-20 hover:bg-opacity-30 px-4 py-2 rounded-full transition-all">
    查看展示頁 →
  </a>
</nav>

<div class="max-w-3xl mx-auto px-4 py-8">

  <!-- Form Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-8" id="form-card">
    <h2 class="text-xl font-medium text-gray-800 mb-1" id="form-title">新增行程</h2>
    <p class="text-xs text-gray-400 mb-6">填寫基本資料，並選擇行程內容管理方式後儲存</p>

    <!-- Editor Tab Switcher -->
    <div class="flex gap-2 mb-6 p-1 bg-gray-100 rounded-xl w-fit">
      <button id="tab-btn-image" onclick="switchTab('image')"
        class="px-4 py-2 rounded-lg text-sm font-medium transition-all bg-white shadow-sm" style="color:#D12351">
        📷 方案 A · 行程圖片上傳
      </button>
      <button id="tab-btn-richtext" onclick="switchTab('richtext')"
        class="px-4 py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700">
        ✏️ 方案 B · Rich Text 編輯器
      </button>
    </div>

    <!-- Common Fields -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">行程名稱 <span class="text-red-400">*</span></label>
        <input id="field-name" type="text"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 transition-all"
          style="--tw-ring-color: #D12351"
          onfocus="this.style.borderColor='#D12351'" onblur="this.style.borderColor='#e5e7eb'"
          placeholder="例：北海道 5 日溫泉之旅">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">目的地分類 <span class="text-red-400">*</span></label>
        <input id="field-destination" type="text"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none transition-all"
          onfocus="this.style.borderColor='#D12351'" onblur="this.style.borderColor='#e5e7eb'"
          placeholder="例：日本 · 北海道">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">門市價格（NT$）</label>
        <input id="field-price" type="number" min="0"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none transition-all"
          onfocus="this.style.borderColor='#D12351'" onblur="this.style.borderColor='#e5e7eb'"
          placeholder="45800">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">標籤</label>
        <div class="flex gap-4 pt-1">
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="checkbox" value="熱門" class="tag-checkbox w-3.5 h-3.5 accent-rose-600"> 熱門
          </label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="checkbox" value="超值" class="tag-checkbox w-3.5 h-3.5 accent-rose-600"> 超值
          </label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="checkbox" value="限時" class="tag-checkbox w-3.5 h-3.5 accent-rose-600"> 限時
          </label>
        </div>
      </div>
    </div>

    <!-- Thumbnail -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-2">縮圖（列表卡片用）</label>
      <div class="flex items-center gap-4">
        <label class="cursor-pointer flex items-center gap-2 bg-gray-50 border border-gray-200 border-dashed rounded-lg px-4 py-2 text-sm text-gray-500 hover:border-rose-300 hover:text-rose-500 transition-all">
          <span>🖼</span> 選擇縮圖
          <input id="thumbnail-input" type="file" accept="image/*" class="hidden">
        </label>
        <div id="thumbnail-preview-wrap" class="hidden items-center gap-2">
          <img id="thumbnail-preview" class="h-14 w-20 object-cover rounded-lg border border-gray-100" alt="縮圖預覽">
          <button onclick="clearThumbnail()" class="text-xs text-gray-400 hover:text-red-400 transition-all">✕ 移除</button>
        </div>
      </div>
    </div>

    <!-- Panel A: Image Upload -->
    <div id="panel-image">
      <label class="block text-sm font-medium text-gray-700 mb-2">行程圖片（可上傳多張）</label>
      <div id="drop-zone"
        class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center cursor-pointer hover:border-rose-300 hover:bg-rose-50 transition-all mb-3">
        <div class="text-3xl mb-2">📷</div>
        <p class="text-sm text-gray-500">拖曳圖片至此，或點擊選擇</p>
        <p class="text-xs text-gray-400 mt-1">支援 JPG、PNG，可多選（行程 PDF 請先截圖或轉圖）</p>
        <input id="image-input" type="file" accept="image/*" multiple class="hidden">
      </div>
      <div id="image-previews" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Panel B: Rich Text -->
    <div id="panel-richtext" class="hidden">
      <label class="block text-sm font-medium text-gray-700 mb-2">行程內容（支援格式化文字）</label>
      <div id="quill-editor"></div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3 mt-6 pt-4 border-t border-gray-100">
      <button onclick="saveTour()"
        class="text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:opacity-90 active:scale-95 transition-all shadow-sm"
        style="background:#D12351">
        儲存行程
      </button>
      <button onclick="resetForm()"
        class="bg-gray-100 text-gray-600 px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-200 active:scale-95 transition-all">
        清除表單
      </button>
      <span id="save-notice" class="hidden text-sm text-green-600 font-medium">✓ 儲存成功！</span>
    </div>
  </div>

  <!-- Tour List -->
  <div>
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-medium text-gray-800">已儲存行程</h2>
      <button onclick="clearAll()" class="text-xs text-gray-400 hover:text-red-400 transition-all">清除所有資料</button>
    </div>
    <div id="tour-list" class="space-y-3"></div>
    <div id="list-empty" class="hidden text-center py-10">
      <p class="text-sm text-gray-400">尚無行程，請在上方新增</p>
    </div>
  </div>

</div>

<script>
  const STORAGE_KEY = 'demo_tours';
  let editingId = null;
  let uploadedImages = [];
  let thumbnailBase64 = '';
  let quill = null;
  let activeTab = 'image';

  // ── Init ─────────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    quill = new Quill('#quill-editor', {
      theme: 'snow',
      placeholder: '輸入行程內容…例如：逐日行程、費用含不含、注意事項等',
      modules: {
        toolbar: [
          [{ header: [2, 3, false] }],
          ['bold', 'italic', 'underline'],
          [{ list: 'ordered' }, { list: 'bullet' }],
          ['clean']
        ]
      }
    });
    setupThumbnail();
    setupImageDrop();
    renderList();
  });

  // ── Storage ───────────────────────────────────────────────────────────────────
  function getTours() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function setTours(tours) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tours));
    } catch (e) {
      alert('儲存空間不足！請嘗試使用較小的圖片，或刪除舊資料後再試。');
      throw e;
    }
  }

  // ── Tab ───────────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('panel-image').classList.toggle('hidden', tab !== 'image');
    document.getElementById('panel-richtext').classList.toggle('hidden', tab !== 'richtext');

    const btnImage = document.getElementById('tab-btn-image');
    const btnRichtext = document.getElementById('tab-btn-richtext');

    if (tab === 'image') {
      btnImage.className = 'px-4 py-2 rounded-lg text-sm font-medium transition-all bg-white shadow-sm';
      btnImage.style.color = '#D12351';
      btnRichtext.className = 'px-4 py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700';
      btnRichtext.style.color = '';
    } else {
      btnRichtext.className = 'px-4 py-2 rounded-lg text-sm font-medium transition-all bg-white shadow-sm';
      btnRichtext.style.color = '#D12351';
      btnImage.className = 'px-4 py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700';
      btnImage.style.color = '';
    }
  }

  // ── Thumbnail ─────────────────────────────────────────────────────────────────
  function setupThumbnail() {
    document.getElementById('thumbnail-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        thumbnailBase64 = ev.target.result;
        document.getElementById('thumbnail-preview').src = thumbnailBase64;
        document.getElementById('thumbnail-preview-wrap').classList.remove('hidden');
        document.getElementById('thumbnail-preview-wrap').classList.add('flex');
      };
      reader.readAsDataURL(file);
    });
  }

  function clearThumbnail() {
    thumbnailBase64 = '';
    document.getElementById('thumbnail-input').value = '';
    document.getElementById('thumbnail-preview-wrap').classList.add('hidden');
    document.getElementById('thumbnail-preview-wrap').classList.remove('flex');
    document.getElementById('thumbnail-preview').src = '';
  }

  // ── Image Upload ──────────────────────────────────────────────────────────────
  function setupImageDrop() {
    const dropZone = document.getElementById('drop-zone');
    const input = document.getElementById('image-input');

    dropZone.addEventListener('click', () => input.click());
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('border-rose-400', 'bg-rose-50');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('border-rose-400', 'bg-rose-50');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('border-rose-400', 'bg-rose-50');
      loadImageFiles(e.dataTransfer.files);
    });
    input.addEventListener('change', (e) => {
      loadImageFiles(e.target.files);
      e.target.value = '';
    });
  }

  function loadImageFiles(files) {
    const promises = Array.from(files).map(file => new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    }));
    Promise.all(promises).then(results => {
      uploadedImages.push(...results);
      renderImagePreviews();
    });
  }

  function renderImagePreviews() {
    const container = document.getElementById('image-previews');
    if (uploadedImages.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = uploadedImages.map((src, i) => `
      <div class="preview-item">
        <img src="${src}" class="w-24 h-20 object-cover rounded-lg border border-gray-200" alt="圖片 ${i + 1}">
        <button class="remove-btn" onclick="removeImage(${i})" title="移除">✕</button>
      </div>
    `).join('');
  }

  function removeImage(index) {
    uploadedImages.splice(index, 1);
    renderImagePreviews();
  }

  // ── Save / Reset ──────────────────────────────────────────────────────────────
  function saveTour() {
    const name = document.getElementById('field-name').value.trim();
    const destination = document.getElementById('field-destination').value.trim();
    if (!name) { alert('請填寫行程名稱'); document.getElementById('field-name').focus(); return; }
    if (!destination) { alert('請填寫目的地分類'); document.getElementById('field-destination').focus(); return; }

    const tags = Array.from(document.querySelectorAll('.tag-checkbox:checked')).map(cb => cb.value);
    const price = parseInt(document.getElementById('field-price').value) || 0;
    const richText = quill.root.innerHTML.trim();

    const tour = {
      id: editingId || Date.now().toString(),
      name, destination, tags, price,
      thumbnail: thumbnailBase64,
      contentType: activeTab,
      images: activeTab === 'image' ? [...uploadedImages] : [],
      richText: activeTab === 'richtext' ? (richText === '<p><br></p>' ? '' : richText) : '',
    };

    const tours = getTours();
    if (editingId) {
      const idx = tours.findIndex(t => t.id === editingId);
      if (idx !== -1) tours[idx] = tour; else tours.push(tour);
    } else {
      tours.push(tour);
    }

    try {
      setTours(tours);
      showNotice();
      resetForm();
      renderList();
    } catch (e) { /* error already shown in setTours */ }
  }

  function resetForm() {
    editingId = null;
    uploadedImages = [];
    document.getElementById('field-name').value = '';
    document.getElementById('field-destination').value = '';
    document.getElementById('field-price').value = '';
    document.querySelectorAll('.tag-checkbox').forEach(cb => cb.checked = false);
    clearThumbnail();
    renderImagePreviews();
    quill.setContents([]);
    document.getElementById('form-title').textContent = '新增行程';
    switchTab('image');
  }

  function showNotice() {
    const el = document.getElementById('save-notice');
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 2500);
  }

  // ── Edit / Delete ─────────────────────────────────────────────────────────────
  function editTour(id) {
    const tour = getTours().find(t => t.id === id);
    if (!tour) return;

    editingId = id;
    document.getElementById('field-name').value = tour.name;
    document.getElementById('field-destination').value = tour.destination;
    document.getElementById('field-price').value = tour.price || '';
    document.querySelectorAll('.tag-checkbox').forEach(cb => {
      cb.checked = (tour.tags || []).includes(cb.value);
    });

    thumbnailBase64 = tour.thumbnail || '';
    if (thumbnailBase64) {
      document.getElementById('thumbnail-preview').src = thumbnailBase64;
      document.getElementById('thumbnail-preview-wrap').classList.remove('hidden');
      document.getElementById('thumbnail-preview-wrap').classList.add('flex');
    }

    switchTab(tour.contentType || 'image');
    uploadedImages = [...(tour.images || [])];
    renderImagePreviews();

    if (tour.contentType === 'richtext') {
      quill.clipboard.dangerouslyPasteHTML(tour.richText || '');
    }

    document.getElementById('form-title').textContent = '編輯行程';
    document.getElementById('form-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function deleteTour(id) {
    setTours(getTours().filter(t => t.id !== id));
    if (editingId === id) resetForm();
    renderList();
  }

  function clearAll() {
    if (!confirm('確定要清除所有行程資料嗎？')) return;
    localStorage.removeItem(STORAGE_KEY);
    resetForm();
    renderList();
  }

  // ── List ──────────────────────────────────────────────────────────────────────
  function renderList() {
    const tours = getTours();
    const list = document.getElementById('tour-list');
    const empty = document.getElementById('list-empty');

    if (tours.length === 0) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    list.innerHTML = tours.map(tour => `
      <div class="bg-white rounded-xl border border-gray-100 p-4 flex items-center gap-4 shadow-sm hover:shadow-md transition-shadow">
        ${tour.thumbnail
          ? `<img src="${tour.thumbnail}" class="w-16 h-12 object-cover rounded-lg flex-shrink-0 border border-gray-100">`
          : `<div class="w-16 h-12 bg-gray-50 rounded-lg flex-shrink-0 flex items-center justify-center text-gray-300 text-2xl border border-gray-100">✈</div>`
        }
        <div class="flex-1 min-w-0">
          <div class="font-medium text-gray-800 truncate">${escHtml(tour.name)}</div>
          <div class="text-xs text-gray-400 mt-0.5">${escHtml(tour.destination)}</div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0 ml-2">
          <span class="text-xs px-2 py-0.5 rounded-full font-medium ${tour.contentType === 'image' ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600'}">
            ${tour.contentType === 'image' ? '📷 圖片' : '✏️ Rich Text'}
          </span>
          <span class="text-sm font-bold" style="color:#D12351">NT$${(tour.price || 0).toLocaleString()}</span>
          <button onclick="editTour('${tour.id}')" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-lg transition-all">編輯</button>
          <button onclick="deleteTour('${tour.id}')" class="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-3 py-1.5 rounded-lg transition-all">刪除</button>
        </div>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
