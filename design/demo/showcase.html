<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行程展示 · 找到了旅遊</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    body { background: #fffcfd; color: #374151; }

    /* Rich Text content rendering */
    .rt-content { line-height: 1.75; color: #374151; }
    .rt-content h2 { font-size: 1.2rem; font-weight: 700; margin: 1.25rem 0 0.5rem; padding-bottom: 0.25rem; border-bottom: 1px solid #ffe4e6; color: #D12351; }
    .rt-content h3 { font-size: 1.05rem; font-weight: 600; margin: 1rem 0 0.4rem; color: #374151; }
    .rt-content p { margin-bottom: 0.6rem; }
    .rt-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .rt-content ol { list-style: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .rt-content li { margin-bottom: 0.25rem; }
    .rt-content strong { font-weight: 700; }
    .rt-content em { font-style: italic; color: #6b7280; }
    .rt-content u { text-decoration: underline; }

    /* Card hover */
    .tour-card { transition: transform 0.2s, box-shadow 0.2s; }
    .tour-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px -8px rgba(209,35,81,0.15); }

    /* Modal */
    #modal { transition: opacity 0.2s; }
    #modal.hidden { display: none; }
    #modal-box { max-height: 90vh; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav style="background:#D12351" class="text-white px-6 py-4 flex items-center justify-between shadow-md sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-white bg-opacity-20 rounded-lg flex items-center justify-center font-bold text-sm">D</div>
    <span class="font-medium tracking-wide">找到了旅遊 · 行程展示</span>
  </div>
  <a href="admin.html" class="text-sm bg-white bg-opacity-20 hover:bg-opacity-30 px-4 py-2 rounded-full transition-all">
    ← 前往後台
  </a>
</nav>

<div class="max-w-6xl mx-auto px-4 py-8">

  <div class="mb-8 flex items-end justify-between">
    <div>
      <h1 class="text-2xl font-light text-gray-800 tracking-widest">行程列表</h1>
      <p class="text-sm text-gray-400 mt-1">點擊卡片查看行程詳情</p>
    </div>
    <button onclick="location.reload()" class="text-xs text-gray-400 hover:text-gray-600 transition-all">↻ 重新整理</button>
  </div>

  <!-- Grid -->
  <div id="tour-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <!-- Empty state -->
  <div id="empty-state" class="hidden text-center py-24">
    <div class="text-6xl mb-4">✈️</div>
    <p class="text-gray-400 mb-2">尚無行程資料</p>
    <a href="admin.html" class="inline-block text-sm font-medium hover:opacity-80 transition-all" style="color:#D12351">前往後台新增 →</a>
  </div>

</div>

<!-- Detail Modal -->
<div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black bg-opacity-60" onclick="closeModal()"></div>
  <!-- Box -->
  <div id="modal-box" class="relative bg-white rounded-2xl shadow-2xl w-full max-w-5xl overflow-hidden flex" style="max-height:90vh">
    <!-- Left: content -->
    <div class="flex-1 overflow-y-auto p-6 min-w-0" id="modal-content-area">
      <!-- filled by JS -->
    </div>
    <!-- Right: info -->
    <div class="w-72 bg-gray-50 border-l border-gray-100 p-6 flex flex-col flex-shrink-0" style="min-height:100%">
      <button onclick="closeModal()" class="self-end text-gray-300 hover:text-gray-500 text-2xl leading-none mb-6 transition-colors">✕</button>

      <div id="modal-destination" class="text-xs text-gray-400 tracking-wider uppercase mb-1.5"></div>
      <h2 id="modal-name" class="text-xl font-medium text-gray-800 leading-snug mb-4"></h2>

      <div id="modal-tags" class="flex flex-wrap gap-1.5 mb-6"></div>

      <div id="modal-type-badge" class="mb-4"></div>

      <div class="mt-auto pt-4 border-t border-gray-200">
        <div class="text-xs text-gray-400 mb-1">門市價格</div>
        <div id="modal-price" class="text-2xl font-bold" style="color:#D12351"></div>
        <div class="text-xs text-gray-400 mt-1.5 leading-relaxed">※ 優惠方案及出發日期<br>請洽服務專員</div>
      </div>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'demo_tours';

  function getTours() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Render grid ───────────────────────────────────────────────────────────────
  function renderGrid() {
    const tours = getTours();
    const grid = document.getElementById('tour-grid');
    const empty = document.getElementById('empty-state');

    if (tours.length === 0) {
      empty.classList.remove('hidden');
      return;
    }

    grid.innerHTML = tours.map(tour => `
      <div class="tour-card bg-white rounded-2xl border border-gray-100 overflow-hidden cursor-pointer shadow-sm"
           onclick="openModal('${escHtml(tour.id)}')">
        <!-- Thumbnail -->
        <div class="relative h-48 bg-gradient-to-br from-rose-50 to-rose-100 overflow-hidden">
          ${tour.thumbnail
            ? `<img src="${tour.thumbnail}" class="w-full h-full object-cover" alt="${escHtml(tour.name)}">`
            : `<div class="w-full h-full flex items-center justify-center text-5xl">✈</div>`
          }
          <!-- Type badge -->
          <div class="absolute top-3 right-3">
            <span class="text-xs px-2 py-1 rounded-full font-medium text-white ${tour.contentType === 'image' ? 'bg-blue-500' : 'bg-emerald-500'}">
              ${tour.contentType === 'image' ? '📷 圖片' : '✏️ Rich Text'}
            </span>
          </div>
        </div>
        <!-- Info -->
        <div class="p-5">
          <div class="text-xs text-gray-400 mb-1 tracking-wide">${escHtml(tour.destination)}</div>
          <h3 class="font-medium text-gray-800 text-base leading-snug mb-3 line-clamp-2">${escHtml(tour.name)}</h3>
          <div class="flex flex-wrap gap-1.5 mb-4">
            ${(tour.tags || []).map(tag =>
              `<span class="text-xs px-2 py-0.5 rounded-full text-white font-medium" style="background:#D12351">${escHtml(tag)}</span>`
            ).join('')}
          </div>
          <div class="flex items-center justify-between pt-3 border-t border-gray-50">
            <div>
              <span class="text-xs text-gray-400">門市價</span>
              <span class="ml-1 font-bold text-sm" style="color:#D12351">NT$${(tour.price || 0).toLocaleString()} 起</span>
            </div>
            <span class="text-xs text-gray-300">查看詳情 →</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── Modal ─────────────────────────────────────────────────────────────────────
  function openModal(id) {
    const tour = getTours().find(t => t.id === id);
    if (!tour) return;

    // Info panel
    document.getElementById('modal-destination').textContent = tour.destination;
    document.getElementById('modal-name').textContent = tour.name;
    document.getElementById('modal-price').textContent = `NT$${(tour.price || 0).toLocaleString()} 起`;
    document.getElementById('modal-tags').innerHTML = (tour.tags || []).map(tag =>
      `<span class="text-xs px-2.5 py-1 rounded-full text-white font-medium" style="background:#D12351">${escHtml(tag)}</span>`
    ).join('');
    document.getElementById('modal-type-badge').innerHTML =
      `<span class="inline-flex items-center gap-1.5 text-xs px-3 py-1 rounded-full font-medium ${tour.contentType === 'image' ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600'}">
        ${tour.contentType === 'image' ? '📷 方案 A · 圖片上傳' : '✏️ 方案 B · Rich Text'}
      </span>`;

    // Content area
    const content = document.getElementById('modal-content-area');
    if (tour.contentType === 'image') {
      if (tour.images && tour.images.length > 0) {
        content.innerHTML = `
          <div class="space-y-4">
            <h3 class="text-sm font-medium text-gray-500 mb-4">行程圖片（共 ${tour.images.length} 張）</h3>
            ${tour.images.map((src, i) =>
              `<img src="${src}" class="w-full rounded-xl shadow-sm border border-gray-100" alt="行程圖片 ${i + 1}">`
            ).join('')}
          </div>
        `;
      } else {
        content.innerHTML = `
          <div class="flex flex-col items-center justify-center h-48 text-gray-400">
            <div class="text-4xl mb-3">📷</div>
            <p class="text-sm">此行程尚未上傳圖片</p>
            <a href="admin.html" class="mt-3 text-xs hover:opacity-80" style="color:#D12351">前往後台新增 →</a>
          </div>
        `;
      }
    } else {
      // Rich Text
      const html = tour.richText || '';
      if (!html || html === '<p><br></p>' || html.trim() === '') {
        content.innerHTML = `
          <div class="flex flex-col items-center justify-center h-48 text-gray-400">
            <div class="text-4xl mb-3">✏️</div>
            <p class="text-sm">此行程尚未填寫內容</p>
            <a href="admin.html" class="mt-3 text-xs hover:opacity-80" style="color:#D12351">前往後台新增 →</a>
          </div>
        `;
      } else {
        content.innerHTML = `
          <div class="mb-4">
            <h3 class="text-sm font-medium text-gray-500 mb-4">行程內容</h3>
          </div>
          <div class="rt-content">${html}</div>
        `;
      }
    }

    document.getElementById('modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    document.body.style.overflow = '';
    document.getElementById('modal-content-area').innerHTML = '';
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ── Boot ──────────────────────────────────────────────────────────────────────
  renderGrid();
</script>
</body>
</html>
